<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Landing Page Constructor V2 - Acceso Alumnos</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #111;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 30px 15px;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    :root {
      --bg-dark: #1a1a1a;
      --card-bg: #252525;
      --gold: #FFD700;
      --gold-hover: #ffe033;
      --electric-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
      --text-main: #ffffff;
      --border-color: #444;
    }

    .app-builder-container {
      background-color: var(--bg-dark);
      color: var(--text-main);
      padding: 40px 20px;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
      border-radius: 12px;
      min-height: 400px;
    }

    .login-container {
      text-align: center;
      padding: 40px;
      animation: fadeIn 0.8s ease;
    }

    .lock-icon {
      font-size: 3rem;
      color: var(--gold);
      margin-bottom: 20px;
      text-shadow: 0 0 15px rgba(255, 215, 0, 0.6);
    }
    .lock-icon img {
      max-width: 90px;
      filter: drop-shadow(0 0 15px rgba(255, 215, 0, 0.4));
    }

    .login-input {
      width: 60%;
      max-width: 300px;
      padding: 15px;
      font-size: 1.2rem;
      text-align: center;
      border-radius: 50px;
      border: 2px solid var(--gold);
      background: #000;
      color: #fff;
      margin-bottom: 20px;
      outline: none;
      letter-spacing: 2px;
    }
    .login-input:focus {
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
    }

    .error-msg {
      color: #ff4444;
      margin-top: 10px;
      font-size: 0.9rem;
      display: none;
    }

    #main-app-content { display: none; }

    .step-card {
      background: var(--card-bg);
      padding: 30px;
      border-radius: 15px;
      box-shadow: var(--electric-shadow);
      border: 1px solid var(--border-color);
      margin-bottom: 30px;
      animation: fadeIn 0.5s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .step-title {
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 25px;
      font-size: 1.4rem;
      text-align: center;
      text-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 15px;
    }

    .form-group { margin-bottom: 20px; }

    .form-label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #ddd;
      font-size: 0.9rem;
    }

    .form-input, .form-select, .form-textarea {
      width: 100%;
      padding: 12px;
      background: #333;
      border: 1px solid #555;
      border-radius: 8px;
      color: #fff;
      font-size: 1rem;
      transition: all 0.3s;
      font-family: inherit;
    }

    .form-input:focus, .form-textarea:focus, .form-select:focus {
      border-color: var(--gold);
      outline: none;
      box-shadow: 0 0 8px rgba(255, 215, 0, 0.3);
    }

    .form-input:disabled {
      background: #222;
      color: #555;
      cursor: not-allowed;
      border-color: #333;
    }

    .form-input::placeholder, .form-textarea::placeholder { color: #666; }

    .checkbox-wrapper {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #333;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #555;
      margin-bottom: 15px;
      cursor: pointer;
    }
    .checkbox-wrapper:hover { border-color: var(--gold); }
    .checkbox-wrapper input { width: 20px; height: 20px; accent-color: var(--gold); cursor: pointer; }

    .btn-gold {
      background: linear-gradient(135deg, #FFD700 0%, #FDB931 100%);
      color: #000;
      border: none;
      padding: 15px 30px;
      font-size: 1rem;
      font-weight: bold;
      text-transform: uppercase;
      border-radius: 50px;
      cursor: pointer;
      width: 100%;
      box-shadow: 0 4px 15px rgba(253, 185, 49, 0.3);
      transition: all 0.3s ease;
      margin-top: 15px;
    }

    .btn-gold:hover {
      background: linear-gradient(135deg, #ffe033 0%, #ffca5c 100%);
      box-shadow: 0 6px 20px rgba(253, 185, 49, 0.5);
      transform: scale(1.02);
    }

    .btn-secondary {
      background: transparent;
      border: 1px solid #555;
      color: #aaa;
      margin-top: 10px;
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
      transition: 0.3s;
      font-size: 0.9rem;
    }
    .btn-secondary:hover { color: #fff; border-color: #fff; }

    .result-area {
      display: none;
      margin-top: 30px;
      background: #111;
      padding: 20px;
      border-radius: 10px;
      border: 1px dashed #555;
    }

    .prompt-output {
      width: 100%;
      height: 200px;
      background: #000;
      color: #0f0;
      font-family: monospace;
      padding: 15px;
      border: none;
      resize: none;
      font-size: 0.85rem;
      border-radius: 5px;
      line-height: 1.5;
    }

    .hidden { display: none !important; }

    .progress-bar {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
      padding: 0 10px;
    }
    .progress-step {
      width: 18%;
      height: 4px;
      background: #333;
      border-radius: 2px;
      transition: background 0.3s;
    }
    .progress-step.active { background: var(--gold); box-shadow: 0 0 5px var(--gold); }

    @media (max-width: 600px) {
      .app-builder-container { padding: 25px 15px; }
      .step-card { padding: 20px 15px; }
      .login-input { width: 80%; }
      .step-title { font-size: 1.1rem; }
    }
  </style>
</head>
<body>

<div class="app-builder-container">

  <div id="login-gate" class="login-container">
    <div class="lock-icon"><img src="https://cdn.shopify.com/s/files/1/0788/2847/0488/files/LogosIconos_3.png?v=1766975544" onerror="this.style.display='none'"></div>
    <h2 style="color:white; margin-bottom:20px;">ÁREA EXCLUSIVA DE ALUMNOS</h2>
    <p style="color:#aaa; margin-bottom:30px;">Ingresa la contraseña maestra para acceder al Generador de Landing Pages.</p>
    <input type="password" id="access_password" class="login-input" placeholder="CONTRASEÑA">
    <br>
    <button class="btn-gold" style="width: 60%; max-width: 300px;" onclick="verificarAcceso()">INGRESAR</button>
    <div id="login-error" class="error-msg">⛔ Contraseña incorrecta</div>
  </div>

  <div id="main-app-content">

    <div class="progress-bar">
      <div id="p1" class="progress-step active"></div>
      <div id="p2" class="progress-step"></div>
      <div id="p3" class="progress-step"></div>
      <div id="p4" class="progress-step"></div>
      <div id="p5" class="progress-step"></div>
    </div>
    <div style="text-align:center; margin-bottom: 20px; color: #888; font-size: 0.9rem;">
      PASO <span id="current-step-display" style="color:#FFD700; font-weight:bold;">1</span> DE 5
    </div>

    <div id="step-1-card" class="step-card">
      <h2 class="step-title">1. LANDING PAGE CONSTRUCTOR</h2>

      <div class="form-group">
        <label class="form-label">Tipo de Infoproducto</label>
        <input type="text" id="tipo_producto" class="form-input" placeholder="Ej: Curso, Ebook, Asesoría">
      </div>

      <div class="form-group">
        <label class="form-label">Descripción del Producto</label>
        <textarea id="descripcion_producto" class="form-textarea" rows="3" placeholder="¿Qué soluciona? ¿Para quién es?"></textarea>
      </div>

      <div class="form-group">
        <label class="form-label">Elemento Visual Principal</label>
        <select id="media_selector" class="form-select" onchange="toggleMediaInput()">
          <option value="vsl">Video VSL (Vimeo)</option>
          <option value="mockup">Imagen Mockup</option>
        </select>
      </div>

      <div class="form-group" id="input-vsl-group">
        <label class="form-label">ID Video Vimeo</label>
        <input type="text" id="id_vsl" class="form-input" placeholder="Ej: 123456789">
      </div>

      <div class="form-group hidden" id="input-mockup-group">
        <label class="form-label">URL Imagen Mockup</label>
        <input type="text" id="id_mockup" class="form-input" placeholder="https://...">
      </div>

      <div class="form-group">
        <label class="form-label">Variant ID (Shopify Product)</label>
        <input type="text" id="variant_id" class="form-input" placeholder="Ej: 43290122...">
      </div>

      <div class="form-group">
        <label class="form-label">Color Principal</label>
        <label class="checkbox-wrapper">
          <input type="checkbox" id="ai_color_check" onchange="toggleColorSettings()">
          <span style="font-size:0.9rem; color:#fff;">⚡ Dejar que la IA decida el color ideal</span>
        </label>
        <div id="manual_color_container" style="display:flex; gap:10px; align-items:center; margin-top:10px;">
          <input type="color" id="color_picker" value="#121212" onchange="document.getElementById('hex_label').innerText = this.value" style="border:none; width:50px; height:50px; cursor:pointer; background:none;">
          <span id="hex_label" style="font-family:monospace; color:#FFD700;">#121212</span>
        </div>
      </div>

      <button class="btn-gold" onclick="generarPrompt(1)">Generar Prompt Paso 1</button>
    </div>

    <div id="step-2-card" class="step-card hidden">
      <h2 class="step-title">2. Dolores & Beneficios</h2>
      <div class="form-group">
        <label class="form-label">Cantidad de Dolores</label>
        <select id="qty_dolores" class="form-select">
          <option value="1">1 Dolor</option>
          <option value="2">2 Dolores</option>
          <option value="3">3 Dolores</option>
          <option value="4">4 Dolores</option>
          <option value="5" selected>5 Dolores</option>
          <option value="6">6 Dolores</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Cantidad de Beneficios</label>
        <select id="qty_beneficios" class="form-select">
          <option value="1">1 Beneficio</option>
          <option value="2">2 Beneficios</option>
          <option value="3">3 Beneficios</option>
          <option value="4">4 Beneficios</option>
          <option value="5" selected>5 Beneficios</option>
          <option value="6">6 Beneficios</option>
        </select>
      </div>
      <button class="btn-gold" onclick="generarPrompt(2)">Generar Prompt Paso 2</button>
      <button class="btn-secondary" onclick="navegar(1)">⬅ Volver</button>
    </div>

    <div id="step-3-card" class="step-card hidden">
      <h2 class="step-title">3. Oferta & Urgencia</h2>
      <div class="form-group">
        <label class="form-label">Precio Original (Tachado)</label>
        <input type="text" id="precio_tachado" class="form-input" placeholder="Ej: $197 USD">
      </div>
      <div class="form-group">
        <label class="form-label">Precio Oferta (Actual)</label>
        <input type="text" id="precio_oferta" class="form-input" placeholder="Ej: $47 USD">
      </div>
      <button class="btn-gold" onclick="generarPrompt(3)">Generar Prompt Paso 3</button>
      <button class="btn-secondary" onclick="navegar(2)">⬅ Volver</button>
    </div>

    <div id="step-4-card" class="step-card hidden">
      <h2 class="step-title">4. Stack de Bonus</h2>
      <div class="form-group">
        <label class="form-label">Cantidad de Bonus Gratuitos (1-15)</label>
        <select id="cantidad_bonus" class="form-select">
          <option value="1">1 Bonus</option>
          <option value="2">2 Bonus</option>
          <option value="3" selected>3 Bonus</option>
          <option value="4">4 Bonus</option>
          <option value="5">5 Bonus</option>
          <option value="6">6 Bonus</option>
          <option value="7">7 Bonus</option>
          <option value="8">8 Bonus</option>
          <option value="9">9 Bonus</option>
          <option value="10">10 Bonus</option>
          <option value="11">11 Bonus</option>
          <option value="12">12 Bonus</option>
          <option value="13">13 Bonus</option>
          <option value="14">14 Bonus</option>
          <option value="15">15 Bonus</option>
        </select>
      </div>
      <button class="btn-gold" onclick="generarPrompt(4)">Generar Prompt Paso 4</button>
      <button class="btn-secondary" onclick="navegar(3)">⬅ Volver</button>
    </div>

    <div id="step-5-card" class="step-card hidden">
      <h2 class="step-title">5. Prueba Social & FAQ</h2>
      <div class="form-group">
        <label class="form-label">Cantidad de Testimonios (1-15)</label>
        <select id="cantidad_testimonios" class="form-select">
          <option value="3">3 Testimonios</option>
          <option value="4">4 Testimonios</option>
          <option value="5">5 Testimonios</option>
          <option value="6" selected>6 Testimonios</option>
          <option value="7">7 Testimonios</option>
          <option value="8">8 Testimonios</option>
          <option value="9">9 Testimonios</option>
          <option value="10">10 Testimonios</option>
          <option value="11">11 Testimonios</option>
          <option value="12">12 Testimonios</option>
          <option value="13">13 Testimonios</option>
          <option value="14">14 Testimonios</option>
          <option value="15">15 Testimonios</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Cantidad de Preguntas Frecuentes (1-10)</label>
        <select id="cantidad_faq" class="form-select">
          <option value="3">3 Preguntas</option>
          <option value="4">4 Preguntas</option>
          <option value="5" selected>5 Preguntas</option>
          <option value="6">6 Preguntas</option>
          <option value="7">7 Preguntas</option>
          <option value="8">8 Preguntas</option>
          <option value="9">9 Preguntas</option>
          <option value="10">10 Preguntas</option>
        </select>
      </div>
      <button class="btn-gold" onclick="generarPrompt(5)">Generar Prompt Final</button>
      <button class="btn-secondary" onclick="navegar(4)">⬅ Volver</button>
    </div>

    <div id="result-area" class="result-area">
      <label class="form-label" style="color:var(--gold)">Copia esto y pégalo en Gemini:</label>
      <textarea id="final-prompt" class="prompt-output" readonly></textarea>
      <div style="display:flex; gap:10px; margin-top:15px;">
        <button class="btn-gold" style="flex:1;" onclick="copiarPrompt()">COPIAR TEXTO</button>
        <button class="btn-secondary" id="btn-next-step" style="flex:1; margin-top:0; border-color:var(--gold); color:var(--gold);" onclick="avanzarPaso()">SIGUIENTE PASO ➡</button>
      </div>
    </div>
  </div>

</div>

<script>
  const _k = "RVhJVE8yMDI2";

  function verificarAcceso() {
    const i = document.getElementById('access_password').value;
    const e = document.getElementById('login-error');
    if (btoa(i) === _k) {
      document.getElementById('login-gate').style.display = 'none';
      document.getElementById('main-app-content').style.display = 'block';
    } else {
      e.style.display = 'block';
    }
  }

  document.getElementById("access_password").addEventListener("keypress", function(ev) {
    if (ev.key === "Enter") verificarAcceso();
  });

  let pasoActual = 1;
  const totalPasos = 5;

  function toggleColorSettings() {
    const isAi = document.getElementById('ai_color_check').checked;
    const cp = document.getElementById('color_picker');
    const hl = document.getElementById('hex_label');
    if (isAi) { cp.disabled = true; hl.style.color = "#555"; hl.innerText = "IA Decidirá"; }
    else { cp.disabled = false; hl.style.color = "#FFD700"; hl.innerText = cp.value; }
  }

  function toggleMediaInput() {
    const v = document.getElementById('media_selector').value;
    document.getElementById('input-vsl-group').classList.toggle('hidden', v !== 'vsl');
    document.getElementById('input-mockup-group').classList.toggle('hidden', v !== 'mockup');
  }

  function navegar(d) {
    for (let i = 1; i <= totalPasos; i++) {
      document.getElementById(`step-${i}-card`).classList.add('hidden');
      document.getElementById(`p${i}`).classList.remove('active');
    }
    document.getElementById(`step-${d}-card`).classList.remove('hidden');
    for (let i = 1; i <= d; i++) {
      document.getElementById(`p${i}`).classList.add('active');
    }
    document.getElementById('current-step-display').innerText = d;
    document.getElementById('result-area').style.display = 'none';
    pasoActual = d;
  }

  function avanzarPaso() {
    if (pasoActual < totalPasos) navegar(pasoActual + 1);
    else alert("¡Felicidades! Proceso completado.");
  }

  function copiarPrompt() {
    const el = document.getElementById("final-prompt");
    el.select();
    navigator.clipboard.writeText(el.value);
    const btn = document.querySelector("#result-area .btn-gold");
    const originalText = btn.innerText;
    btn.innerText = "¡COPIADO! ✅";
    setTimeout(() => { btn.innerText = originalText; }, 2000);
  }

  function generarPrompt(paso) {
    const tipo = document.getElementById('tipo_producto').value || "[TIPO]";
    const desc = document.getElementById('descripcion_producto').value || "[DESCRIPCION]";
    const variant = document.getElementById('variant_id').value || "[VARIANT_ID]";
    const isAi = document.getElementById('ai_color_check').checked;
    const mColor = document.getElementById('color_picker').value;

    const cInstr = isAi
      ? "IMPORTANTE: Elige TÚ el código de color hexadecimal principal que mejor se adapte a la psicología de este nicho. Color premium."
      : `El diseño del fondo será de color ${mColor}`;
    const cRef = isAi ? "la paleta elegida en el paso 1" : mColor;

    const isVsl = document.getElementById('media_selector').value === 'vsl';
    const mId = isVsl ? document.getElementById('id_vsl').value : document.getElementById('id_mockup').value;
    const mStr = isVsl ? `VSL VIMEO ID: ${mId} (titulo y logo del autor ocultos, pero que la barra de reproducción sea visible, debe ser autoplay y tener el loop activado.\n)` : `IMAGEN MOCKUP URL: ${mId}`;

    let pf = "";

    switch(paso) {
      case 1:
        pf = `Eres experto programador de páginas web y estás creando una página de venta en Shopify insertando custom liquid.
IMPORTANTE: Fondo continuo sin espacios (margin-top: 0). Padding superior 40px.
Infoproducto: ${tipo} sobre ${desc}.

TE EXIJO RESPETAR ESTRICTAMENTE EL SIGUIENTE ORDEN VERTICAL Y ALINEACIÓN CENTRADA:

1. PARA QUIEN 10px máximo y hasta 8 palabras (Incorporar dentro de una capsula para quien esta enfocado el ebook ej: La guia definitiva para amas de casa)
2. PROMESA DIRECTA 45px máximo (al final SUMARLE PLAZO DE LOGRO EN X DIAS).
3. REFUERZO PROMESA 14px (Texto justo debajo del título).
4. ELEMENTO VISUAL -> ${mStr}. (Este elemento debe ir OBLIGATORIAMENTE debajo del refuerzo y encima del botón, en caso de estar vacio incorporar una imagen relacionada al producto desde pexels).
5. BOTÓN CTA (Titulo acorde) directo a checkout variant id: ${variant} usando el formato <a href="/cart/${variant}:1" class="lp-cta-button" target="_blank">

REGLA DE ORO DE DISEÑO: TODO EL CONTENIDO DEBE ESTAR PERFECTAMENTE CENTRADO HORIZONTALMENTE (Usa 'text-align: center' en el contenedor y 'margin: 0 auto' en elementos de bloque o imágenes).

${cInstr} (gradiente texturado premium). Efectos de movimiento gradiente de colores neón en palabras clave dentro del titulo, bordes redondeados, sombras luminosas neon en palabras clave. Importa 3 tipografias premium como máximo desde Google Font Api. Botones con movimiento.`;
        break;
      case 2:
        const qD = document.getElementById('qty_dolores').value;
        const qB = document.getElementById('qty_beneficios').value;
        pf = `Estética (${cRef}, premium). Sección 2:
Producto: ${tipo} sobre ${desc}.
Estructura:

MENSAJE ESTILO SUBTITULO DE UNA ACCIÓN DIRECTA QUE ESTE PRODUCTO SANARÁ EL DOLOR MÁXIMO DE LA PERSONA
DOLORES (${qD} puntos, imagen actual disponible de unsplash mini hero).
BENEFICIOS (${qB} puntos, imagen actual disponible de unsplash mini hero).
Viñetas ROJAS (dolores) y VERDES (beneficios). Responsive.`;
        break;
      case 3:
        const pT = document.getElementById('precio_tachado').value;
        const pO = document.getElementById('precio_oferta').value;
        pf = `Estética (${cRef}). Sección 3:
MENSAJE DE REFUERZO DE POR QUÉ LA PERSONA DEBERÍA COMPRAR EL PRODUCTO RESALTANDO SU DOLOR MÁXIMO (Basado en: ${desc})
MOCKUP 1:1 Centrado (unsplash)
5 Estrellas en formato emoji + número aleatorio entre 100 y 300 reviews (texto muy pequeño)
TITULO 18px
PRECIO TACHADO gris (${pT}) + OFERTA (${pO})
URGENCIA "ÚLTIMOS 5 CUPOS 🎁"
CTA (VARIANT ID: ${variant}).
"GARANTÍA 7 DIAS" (desplegable)
CONTADOR URGENCIA (bordes electricos con movimientos del color principal, de 15 minutos, que se reinicie al refrescar pagina, con mensaje incluido imitando el estilo "el descuento dura 15 minutos, si no ingresas, pasa a la siguiente persona").`;
        break;
      case 4:
        const cBo = document.getElementById('cantidad_bonus').value;
        pf = `Estética (${cRef}). Sección 4:
MENSAJE "ADQUIRIENDO HOY TAMBIÉN LLEVAS.."
BONUS: ${cBo} bonus creativos (${desc}). Tarjetas horizontales, mockup 1:1 unsplash + titulo + desc + valor tachado + GRATIS.
MENSAJE "TODO LO QUE RECIBES"
MOCKUP CUADRADO (todos los bonus)
CTA (VARIANT ID: ${variant}).`;
        break;
      case 5:
        const cT = document.getElementById('cantidad_testimonios').value;
        const cF = document.getElementById('cantidad_faq').value;
        pf = `Estética (${cRef}). Sección 5:
MENSAJE "TESTIMONIOS.."
TESTIMONIOS: ${cT} (${desc}). Carrousel. Nombres, estrellas, avatares, fotos (si aplica).
FAQ: ${cF} preguntas (${desc}), desplegables.`;
        break;
    }

    document.getElementById('final-prompt').value = pf.trim();
    document.getElementById('result-area').style.display = 'block';
    document.getElementById('result-area').scrollIntoView({behavior: "smooth"});

    const bn = document.getElementById('btn-next-step');
    if (paso === 5) {
      bn.innerText = "¡FINALIZAR!";
      bn.onclick = function() { alert("¡Generado con éxito!"); };
    } else {
      bn.innerText = "SIGUIENTE ➡";
      bn.onclick = avanzarPaso;
    }
